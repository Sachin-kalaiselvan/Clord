allOf:
  - $ref: '#/components/schemas/account_detail'
  - type: object
    properties:
      latest_clord_version:
        type:
          - string
          - 'null'
        description: Latest version of clord available
        example: "3.0.0"
      subscribed_features:
        type: array
        items:
          type: string
        description: List of subscribed enterprise features (if enterprise edition is enabled)